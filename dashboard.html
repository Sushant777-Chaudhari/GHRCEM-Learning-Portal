<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — GHRCEM Learning</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- ══════════════ TOPNAV ══════════════ -->
<nav class="topnav">
  <div class="nav-brand">
    <div class="nav-logo">G</div>
    <div class="nav-title">
      <h1>GHRCEM Learning</h1>
      <span id="navRoleLabel">Portal</span>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-notif" onclick="showToast('📢 3 new notifications')">
      <i class="fas fa-bell"></i>
      <div class="notif-dot"></div>
    </div>
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar">A</div>
      <div class="nav-user-info">
        <div class="u-name" id="navName">Admin User</div>
        <div class="u-role" id="navRole">Administrator</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</nav>

<!-- ══════════════ APP SHELL ══════════════ -->
<div class="app-shell">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar"></div>

  <!-- MAIN -->
  <div class="main-content" id="mainContent"></div>
</div>

<!-- ══════════════ MODALS ══════════════ -->

<!-- Add Subject Modal -->
<div class="modal-overlay" id="subjectModal">
  <div class="modal">
    <div class="modal-title">📚 Add New Subject</div>
    <div class="form-row">
      <div class="form-group"><label>Subject Name</label><input type="text" placeholder="Data Structures & Algorithms"></div>
      <div class="form-group"><label>Subject Code</label><input type="text" placeholder="CS301"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Department</label>
        <select><option>Computer Engineering</option><option>IT</option><option>Mechanical</option><option>Civil</option></select>
      </div>
      <div class="form-group"><label>Year</label>
        <select><option>First Year</option><option>Second Year</option><option>Third Year</option><option>Final Year</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Credits</label><input type="number" placeholder="4"></div>
      <div class="form-group"><label>Assign Teacher</label>
        <select><option>Prof. S. Kulkarni</option><option>Dr. A. Mehta</option><option>Prof. R. Joshi</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('subjectModal')">Cancel</button>
      <button class="btn btn-gold" onclick="closeModal('subjectModal');showToast('✅ Subject added successfully!')"><i class="fas fa-plus"></i> Add Subject</button>
    </div>
  </div>
</div>

<!-- Upload Material Modal -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <div class="modal-title">📤 Upload Study Material</div>
    <div class="form-group"><label>Subject</label>
      <select><option>Data Structures (CS301)</option><option>Computer Networks (CS401)</option><option>DBMS (CS302)</option></select>
    </div>
    <div class="form-group"><label>Material Type</label>
      <select><option>Lecture Notes</option><option>Assignment</option><option>Previous Year Paper</option><option>Reference Book</option><option>Video Link</option></select>
    </div>
    <div class="form-group"><label>Title</label><input type="text" placeholder="Unit 3 - Trees and Graphs"></div>
    <div class="upload-zone" onclick="showToast('📂 File picker opened')">
      <i class="fas fa-cloud-upload-alt"></i>
      <p><b>Click to upload</b> or drag & drop</p>
      <p style="font-size:11px;margin-top:4px">PDF, DOC, PPT, Video (max 50MB)</p>
    </div>
    <div class="form-group" style="margin-top:14px"><label>Description (optional)</label>
      <textarea rows="3" placeholder="Brief description of this material..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('uploadModal')">Cancel</button>
      <button class="btn btn-gold" onclick="closeModal('uploadModal');showToast('✅ Material uploaded!')"><i class="fas fa-upload"></i> Upload</button>
    </div>
  </div>
</div>

<!-- Add Assignment Modal -->
<div class="modal-overlay" id="assignmentModal">
  <div class="modal">
    <div class="modal-title">📝 Create Assignment</div>
    <div class="form-group"><label>Subject</label>
      <select><option>Data Structures (CS301)</option><option>Computer Networks (CS401)</option><option>DBMS (CS302)</option></select>
    </div>
    <div class="form-group"><label>Assignment Title</label>
      <input type="text" placeholder="Assignment 3: Binary Trees Implementation">
    </div>
    <div class="form-row">
      <div class="form-group"><label>Due Date</label><input type="date"></div>
      <div class="form-group"><label>Max Marks</label><input type="number" placeholder="25"></div>
    </div>
    <div class="form-group"><label>Instructions</label>
      <textarea rows="4" placeholder="Write the assignment instructions here..."></textarea>
    </div>
    <div class="form-group"><label>Attach File (optional)</label>
      <div class="upload-zone" style="padding:16px" onclick="showToast('📂 File picker opened')">
        <i class="fas fa-paperclip" style="font-size:20px;margin-bottom:6px"></i>
        <p style="font-size:12px">Attach question paper / reference</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('assignmentModal')">Cancel</button>
      <button class="btn btn-gold" onclick="closeModal('assignmentModal');showToast('✅ Assignment created!')"><i class="fas fa-plus"></i> Create Assignment</button>
    </div>
  </div>
</div>

<!-- Add Student Modal (Admin) -->
<div class="modal-overlay" id="addUserModal">
  <div class="modal">
    <div class="modal-title">👤 Add New User</div>
    <div class="form-row">
      <div class="form-group"><label>Full Name</label><input type="text" placeholder="Rahul Patil"></div>
      <div class="form-group"><label>Role</label>
        <select><option>Student</option><option>Teacher</option><option>Admin</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input type="email" placeholder="user@ghrcem.edu"></div>
      <div class="form-group"><label>Phone</label><input type="tel" placeholder="+91 98765 43210"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Department</label>
        <select><option>Computer Engineering</option><option>IT</option><option>Mechanical</option></select>
      </div>
      <div class="form-group"><label>Roll No / Emp ID</label><input type="text" placeholder="CE2024001"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addUserModal')">Cancel</button>
      <button class="btn btn-gold" onclick="closeModal('addUserModal');showToast('✅ User added and credentials sent!')"><i class="fas fa-user-plus"></i> Add User</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><span class="toast-icon" id="toastIcon">✅</span><span id="toastMsg">Done!</span></div>

<script>
// ══════════════ STATE ══════════════
let currentRole = '';
let currentPanel = '';

const sidebarConfig = {
  admin: [
    { section: 'Main' },
    { id:'dashboard', icon:'fa-gauge', label:'Dashboard' },
    { id:'notices', icon:'fa-bullhorn', label:'Notice Board', badge:'2' },
    { section: 'Academic' },
    { id:'subjects', icon:'fa-book', label:'Subjects' },
    { id:'students', icon:'fa-user-graduate', label:'Students' },
    { id:'teachers', icon:'fa-chalkboard-teacher', label:'Teachers' },
    { id:'materials', icon:'fa-folder-open', label:'Materials' },
    { id:'assignments', icon:'fa-clipboard-list', label:'Assignments' },
    { section: 'Reports' },
    { id:'attendance', icon:'fa-calendar-check', label:'Attendance' },
    { id:'grades', icon:'fa-chart-bar', label:'Grades & Results' },
    { id:'timetable', icon:'fa-clock', label:'Timetable' },
  ],
  teacher: [
    { section: 'Main' },
    { id:'dashboard', icon:'fa-gauge', label:'Dashboard' },
    { id:'notices', icon:'fa-bullhorn', label:'Notice Board' },
    { section: 'My Classes' },
    { id:'mysubjects', icon:'fa-book', label:'My Subjects' },
    { id:'mystudents', icon:'fa-users', label:'My Students' },
    { id:'materials', icon:'fa-folder-open', label:'Upload Material' },
    { id:'assignments', icon:'fa-clipboard-list', label:'Assignments', badge:'3' },
    { section: 'Records' },
    { id:'attendance', icon:'fa-calendar-check', label:'Attendance' },
    { id:'grades', icon:'fa-chart-bar', label:'Marks Entry' },
    { id:'timetable', icon:'fa-clock', label:'Timetable' },
  ],
  student: [
    { section: 'Main' },
    { id:'dashboard', icon:'fa-gauge', label:'Dashboard' },
    { id:'notices', icon:'fa-bullhorn', label:'Notice Board', badge:'2' },
    { section: 'Academics' },
    { id:'mysubjects', icon:'fa-book', label:'My Subjects' },
    { id:'materials', icon:'fa-folder-open', label:'Study Material' },
    { id:'assignments', icon:'fa-clipboard-list', label:'Assignments', badge:'2' },
    { section: 'Performance' },
    { id:'attendance', icon:'fa-calendar-check', label:'My Attendance' },
    { id:'grades', icon:'fa-chart-bar', label:'My Grades' },
    { id:'timetable', icon:'fa-clock', label:'Timetable' },
  ]
};

// ══════════════ INIT ══════════════
window.addEventListener('DOMContentLoaded', () => {
  const role = localStorage.getItem('ghrcem_role');
  const name = localStorage.getItem('ghrcem_name') || 'User';
  if (!role) { window.location.href='index.html'; return; }

  currentRole = role;
  const roleLabels = { admin:'Administrator', teacher:'Faculty', student:'Student' };
  document.getElementById('navName').textContent = name;
  document.getElementById('navRole').textContent = roleLabels[role] || role;
  document.getElementById('navAvatar').textContent = name[0].toUpperCase();
  document.getElementById('navRoleLabel').textContent = roleLabels[role] + ' Portal';

  buildSidebar();
  showPanel('dashboard');
});

function logout() {
  localStorage.removeItem('ghrcem_role');
  localStorage.removeItem('ghrcem_name');
  localStorage.removeItem('ghrcem_email');
  window.location.href = 'index.html';
}

// ══════════════ SIDEBAR ══════════════
function buildSidebar() {
  const cfg = sidebarConfig[currentRole] || [];
  let html = '';
  cfg.forEach(item => {
    if (item.section) {
      html += `<div class="sidebar-label">${item.section}</div>`;
    } else {
      html += `<button class="sidebar-btn" id="sb-${item.id}" onclick="showPanel('${item.id}')">
        <i class="fas ${item.icon}"></i>${item.label}
        ${item.badge ? `<span class="s-badge">${item.badge}</span>` : ''}
      </button>`;
    }
  });
  html += `<div style="margin-top:auto;border-top:1px solid var(--border);padding-top:16px;margin-top:32px"></div>
  <button class="sidebar-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</button>`;
  document.getElementById('sidebar').innerHTML = html;
}

function showPanel(name) {
  currentPanel = name;
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('sb-'+name);
  if (btn) btn.classList.add('active');
  document.getElementById('mainContent').innerHTML = buildPanel(name);
  window.scrollTo(0,0);
}

// ══════════════ PANEL BUILDER ══════════════
function buildPanel(name) {
  switch(name) {
    case 'dashboard':    return dashPanel();
    case 'notices':      return noticePanel();
    case 'subjects':     return subjectsPanel();
    case 'mysubjects':   return mySubjectsPanel();
    case 'students':     return studentsPanel();
    case 'mystudents':   return myStudentsPanel();
    case 'teachers':     return teachersPanel();
    case 'materials':    return materialsPanel();
    case 'assignments':  return assignmentsPanel();
    case 'attendance':   return attendancePanel();
    case 'grades':       return gradesPanel();
    case 'timetable':    return timetablePanel();
    default: return `<div class="empty-state"><i class="fas fa-tools"></i>Coming soon</div>`;
  }
}

// ──────────── DASHBOARD ────────────
function dashPanel() {
  const r = currentRole;

  if (r === 'admin') return `
  <div class="page">
    <div class="section-hdr">
      <div>
        <div class="section-title">Admin Dashboard</div>
        <div style="font-size:13px;color:var(--muted)">Welcome back, ${localStorage.getItem('ghrcem_name')} · ${new Date().toDateString()}</div>
      </div>
      <div class="section-actions">
        <button class="btn btn-outline" onclick="showToast('📄 Generating report...')"><i class="fas fa-download"></i> Export Report</button>
        <button class="btn btn-gold" onclick="document.getElementById('addUserModal').classList.add('open')"><i class="fas fa-user-plus"></i> Add User</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(15,28,63,.08)"><i class="fas fa-users" style="color:var(--navy)"></i></div>
        <div class="stat-label">Total Students</div>
        <div class="stat-value">1,248</div>
        <div class="stat-sub">↑ 48 new this month</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(200,146,42,.12)"><i class="fas fa-chalkboard-teacher" style="color:var(--gold)"></i></div>
        <div class="stat-label">Total Teachers</div>
        <div class="stat-value">86</div>
        <div class="stat-sub">12 departments</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(22,163,74,.1)"><i class="fas fa-book" style="color:var(--green)"></i></div>
        <div class="stat-label">Active Subjects</div>
        <div class="stat-value">142</div>
        <div class="stat-sub">Across 4 years</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(220,38,38,.08)"><i class="fas fa-clipboard-list" style="color:var(--red)"></i></div>
        <div class="stat-label">Pending Approvals</div>
        <div class="stat-value">14</div>
        <div class="stat-sub">Registrations pending</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><i class="fas fa-chart-bar" style="color:var(--gold)"></i> Department-wise Enrollment</div>
        ${[
          ['Computer Engineering','CE',342,'#0f1c3f'],
          ['Information Technology','IT',298,'#c8922a'],
          ['Mechanical Engg','ME',224,'#16a34a'],
          ['Civil Engineering','CE',186,'#2563eb'],
          ['Electronics & TC','EXTC',198,'#7c3aed'],
        ].map(([dept,code,count,color])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div style="width:36px;height:36px;border-radius:8px;background:${color}18;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${color}">${code}</div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px"><span>${dept}</span><b>${count}</b></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(count/342*100)}%;background:${color}"></div></div>
          </div>
        </div>`).join('')}
      </div>

      <div class="card">
        <div class="card-title"><i class="fas fa-clock" style="color:var(--gold)"></i> Recent Activity</div>
        <div class="timeline-item">
          <div class="tl-dot" style="background:var(--green)"><i class="fas fa-user-plus" style="font-size:11px"></i></div>
          <div><div style="font-weight:600;font-size:13px">15 new student registrations</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Today, 09:30 AM</div></div>
        </div>
        <div class="timeline-item">
          <div class="tl-dot" style="background:var(--gold)"><i class="fas fa-upload" style="font-size:11px"></i></div>
          <div><div style="font-weight:600;font-size:13px">Prof. Kulkarni uploaded CS301 notes</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Today, 08:15 AM</div></div>
        </div>
        <div class="timeline-item">
          <div class="tl-dot" style="background:var(--navy)"><i class="fas fa-clipboard-list" style="font-size:11px"></i></div>
          <div><div style="font-weight:600;font-size:13px">Assignment deadline: CS401 — Tomorrow</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Yesterday, 05:00 PM</div></div>
        </div>
        <div class="timeline-item">
          <div class="tl-dot" style="background:#7c3aed"><i class="fas fa-bullhorn" style="font-size:11px"></i></div>
          <div><div style="font-weight:600;font-size:13px">Notice: Mid-term exam schedule published</div><div style="font-size:11px;color:var(--muted);margin-top:2px">2 days ago</div></div>
        </div>
      </div>
    </div>

    <div style="margin-top:20px">
      <div class="section-hdr">
        <div class="section-title" style="font-size:18px">Pending Registration Approvals</div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Department</th><th>Applied</th><th>Action</th></tr></thead>
          <tbody>
            ${[
              ['Ananya Desai','ananya@email.com','Student','Computer Engg','Today'],
              ['Raj Mehta','raj.m@email.com','Student','IT','Today'],
              ['Pooja Joshi','pooja.j@email.com','Student','Mechanical','Yesterday'],
              ['Dr. Vikram Rao','vikram.r@ghrcem.edu','Teacher','Civil Engg','Yesterday'],
            ].map(([n,e,r,d,t])=>`
            <tr>
              <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar">${n[0]}</div><b>${n}</b></div></td>
              <td>${e}</td>
              <td><span class="pill ${r==='Teacher'?'pill-blue':'pill-gold'}">${r}</span></td>
              <td>${d}</td>
              <td style="color:var(--muted)">${t}</td>
              <td>
                <button class="btn btn-success btn-sm" onclick="showToast('✅ ${n} approved!')"><i class="fas fa-check"></i> Approve</button>
                <button class="btn btn-danger btn-sm" onclick="showToast('❌ Request rejected')"><i class="fas fa-times"></i></button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;

  if (r === 'teacher') return `
  <div class="page">
    <div class="section-hdr">
      <div>
        <div class="section-title">Teacher Dashboard</div>
        <div style="font-size:13px;color:var(--muted)">${localStorage.getItem('ghrcem_name')} · Computer Engineering · ${new Date().toDateString()}</div>
      </div>
      <div class="section-actions">
        <button class="btn btn-outline" onclick="document.getElementById('uploadModal').classList.add('open')"><i class="fas fa-upload"></i> Upload Material</button>
        <button class="btn btn-gold" onclick="document.getElementById('assignmentModal').classList.add('open')"><i class="fas fa-plus"></i> New Assignment</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(15,28,63,.08)"><i class="fas fa-users" style="color:var(--navy)"></i></div>
        <div class="stat-label">My Students</div>
        <div class="stat-value">186</div>
        <div class="stat-sub">3 classes assigned</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(200,146,42,.12)"><i class="fas fa-book" style="color:var(--gold)"></i></div>
        <div class="stat-label">My Subjects</div>
        <div class="stat-value">3</div>
        <div class="stat-sub">This semester</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(22,163,74,.1)"><i class="fas fa-clipboard-check" style="color:var(--green)"></i></div>
        <div class="stat-label">Pending Submissions</div>
        <div class="stat-value">24</div>
        <div class="stat-sub">To be graded</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(37,99,235,.08)"><i class="fas fa-folder-open" style="color:#2563eb"></i></div>
        <div class="stat-label">Uploaded Materials</div>
        <div class="stat-value">38</div>
        <div class="stat-sub">This semester</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><i class="fas fa-book" style="color:var(--gold)"></i> My Subjects</div>
        ${[
          {name:'Data Structures & Algo',code:'CS301',year:'SE',students:64,progress:65},
          {name:'Computer Networks',code:'CS401',year:'TE',students:72,progress:48},
          {name:'Operating Systems',code:'CS302',year:'SE',students:50,progress:72},
        ].map(s=>`
        <div style="padding:14px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:600;font-size:14px">${s.name}</div>
              <div style="font-size:11px;color:var(--muted)">${s.code} · ${s.year} · ${s.students} students</div>
            </div>
            <button class="btn btn-outline btn-sm" onclick="showPanel('mysubjects')">View</button>
          </div>
          <div class="progress-bar" style="margin-top:10px"><div class="progress-fill" style="width:${s.progress}%"></div></div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${s.progress}% syllabus covered</div>
        </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title"><i class="fas fa-clock" style="color:var(--gold)"></i> Today's Schedule</div>
        ${[
          {time:'08:30–09:30',sub:'Data Structures',room:'Lab 3, B-Block',type:'Practical'},
          {time:'10:30–11:30',sub:'Computer Networks',room:'Room 204, A-Block',type:'Lecture'},
          {time:'12:30–01:30',sub:'OS Tutorial',room:'Room 108, A-Block',type:'Tutorial'},
          {time:'03:00–04:00',sub:'Project Guidance',room:'Faculty Cabin',type:'Guidance'},
        ].map(l=>`
        <div style="display:flex;gap:12px;margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:var(--muted);min-width:90px">${l.time}</div>
          <div>
            <div style="font-weight:600;font-size:13px">${l.sub}</div>
            <div style="font-size:11px;color:var(--muted)">${l.room}</div>
          </div>
          <span class="chip" style="margin-left:auto;align-self:flex-start">${l.type}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;

  // Student dashboard
  return `
  <div class="page">
    <div class="section-hdr">

// ──────────── TIMETABLE ────────────
function timetablePanel() {
  const periods = ['08:30–09:30','09:30–10:30','10:30–11:30','12:30–01:30','01:30–02:30','02:30–03:30','03:30–04:30'];
  const days2 = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const schedule = {
    Monday:    ['Data Structures','Computer Networks','—','OS Lab','OS Lab','DBMS','—'],
    Tuesday:   ['Computer Networks','—','Mathematics III','Data Structures','—','SE Lab','SE Lab'],
    Wednesday: ['DBMS','Data Structures','—','Computer Networks','Mathematics III','—','Project Work'],
    Thursday:  ['Mathematics III','DBMS','OS','—','Data Structures','Computer Networks','—'],
    Friday:    ['OS','Mathematics III','Data Structures','DBMS','—','—','Library Hour'],
    Saturday:  ['Tutorial DS','Tutorial CN','Tutorial OS','—','—','—','—'],
  };
  const colors2 = {'Data Structures':'#0f1c3f','Computer Networks':'#c8922a','DBMS':'#16a34a','OS':'#7c3aed','OS Lab':'#7c3aed','SE Lab':'#dc2626','Mathematics III':'#2563eb','Tutorial DS':'#0f1c3f','Tutorial CN':'#c8922a','Tutorial OS':'#7c3aed','Project Work':'#db2777','Library Hour':'#6b7280','—':'transparent'};

  return `
  <div class="page">
    <div class="section-hdr"><div class="section-title">🕐 Class Timetable — SE Computer Engineering</div>
      <div class="section-actions">
        <button class="btn btn-outline" onclick="showToast('📄 Timetable PDF downloaded')"><i class="fas fa-download"></i> Download PDF</button>
        ${currentRole==='admin'?`<button class="btn btn-gold" onclick="showToast('✏️ Edit timetable')"><i class="fas fa-pen"></i> Edit</button>`:''}
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="data-table" style="min-width:900px">
        <thead>
          <tr>
            <th style="min-width:110px">Period</th>
            ${days2.map(d=>`<th style="min-width:120px">${d}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${periods.map((p,pi)=>`
          <tr>
            <td style="font-weight:700;font-size:12px;color:var(--navy)">${p}</td>
            ${days2.map(d=>{
              const sub = schedule[d][pi];
              const col = colors2[sub] || '#888';
              return `<td><div style="background:${sub==='—'?'transparent':col+'18'};border-left:3px solid ${sub==='—'?'transparent':col};border-radius:0 6px 6px 0;padding:6px 8px;font-size:12px;font-weight:${sub==='—'?400:600};color:${sub==='—'?'var(--muted)':col}">${sub}</div></td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
      ${Object.entries(colors2).filter(([k])=>k!=='—').map(([sub,col])=>`
        <div style="display:flex;align-items:center;gap:5px;font-size:11px"><span style="width:14px;height:14px;border-radius:3px;background:${col};display:inline-block"></span>${sub}</div>`).join('')}
    </div>
  </div>`;
}

// ══════════════ UTILS ══════════════
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modal on overlay click
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
});
</script>
